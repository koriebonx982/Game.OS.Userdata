name: Game.OS Launcher — Screenshots (Linux · Mac · Windows)

# Builds the Game.OS C# launcher on all three platforms and takes real
# screenshots showing live data fetched from the real Game.OS backend /
# GitHub data repo.  No fake or demo data is used.
#
# The ONLY "fake" items are small placeholder ROM files placed on disk so
# the GameScannerService detects ROMs per-platform in the My Games page.
#
# Required repository secrets  (Settings → Secrets and variables → Actions):
#   DATA_REPO_TOKEN      – fine-grained PAT with Contents:R/W on
#                          Koriebonx98/Game.OS.Private.Data
#                          (same secret used by build-csharp-launcher.yml)
#   GAMEOS_BACKEND_URL   – (optional) deployed backend URL; when set the
#                          launcher uses REST-API mode instead of GitHub-direct
#   GAMEOS_TEST_PASSWORD – real password for the Koriebonx98 account

on:
  workflow_dispatch:
  push:
    paths:
      - 'GameLauncher/**'
      - '.github/workflows/launcher-screenshots.yml'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
# ─────────────────────────────────────────────────────────────────────────────
# LINUX  (Xvfb + xdotool + scrot)
# ─────────────────────────────────────────────────────────────────────────────
  linux-screenshots:
    name: Screenshot — Linux (Xvfb)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Install Xvfb, scrot, xdotool, fonts
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            xvfb openbox scrot xdotool x11-utils \
            libgl1 mesa-utils libgles2 libopengl0 \
            libglib2.0-0 libfontconfig1 libfreetype6 \
            fonts-dejavu-core fonts-noto

      - name: Inject auth credentials
        env:
          DATA_REPO_TOKEN:    ${{ secrets.DATA_REPO_TOKEN }}
          GAMEOS_BACKEND_URL: ${{ secrets.GAMEOS_BACKEND_URL }}
        run: |
          python3 << 'PYEOF'
          import os
          token   = os.environ.get('DATA_REPO_TOKEN', '')
          XOR_KEY = b'GameOS_KEY'
          if token:
              tok_bytes = token.encode('utf-8')
              encoded   = ''.join(f'{b ^ XOR_KEY[i % len(XOR_KEY)]:02x}' for i, b in enumerate(tok_bytes))
              with open('GameLauncher/gameos-token.dat', 'w') as f:
                  f.write(encoded)
              print(f'token injected ({len(encoded)} chars)')
          url = os.environ.get('GAMEOS_BACKEND_URL', '').strip().rstrip('/')
          if url:
              with open('GameLauncher/gameos-backend.url', 'w') as f:
                  f.write(url)
              print(f'backend url: {url}')
          PYEOF

      - name: Create placeholder ROM and Repack files for scanner detection
        run: |
          # ROMs — placed at {driveRoot}/Roms/{Platform}/Games/  (scanner path)
          sudo mkdir -p "/Roms/Xbox 360/Games"
          printf 'placeholder' | sudo tee "/Roms/Xbox 360/Games/Halo 3.iso"               >/dev/null
          printf 'placeholder' | sudo tee "/Roms/Xbox 360/Games/Gears of War.iso"        >/dev/null
          printf 'placeholder' | sudo tee "/Roms/Xbox 360/Games/Forza Motorsport 4.iso"  >/dev/null
          printf 'placeholder' | sudo tee "/Roms/Xbox 360/Games/Halo Reach.iso"          >/dev/null
          printf 'placeholder' | sudo tee "/Roms/Xbox 360/Games/Red Dead Redemption.iso" >/dev/null
          sudo mkdir -p "/Roms/PS3/Games"
          printf 'placeholder' | sudo tee "/Roms/PS3/Games/God of War III.iso"           >/dev/null
          printf 'placeholder' | sudo tee "/Roms/PS3/Games/Uncharted 2.iso"              >/dev/null
          printf 'placeholder' | sudo tee "/Roms/PS3/Games/The Last of Us.iso"           >/dev/null
          sudo mkdir -p "/Roms/Switch/Games"
          printf 'placeholder' | sudo tee "/Roms/Switch/Games/Breath of the Wild.nsp"    >/dev/null
          printf 'placeholder' | sudo tee "/Roms/Switch/Games/Mario Kart 8 Deluxe.nsp"  >/dev/null
          sudo mkdir -p "/Roms/PS4/Games"
          printf 'placeholder' | sudo tee "/Roms/PS4/Games/God of War.pkg"               >/dev/null
          # Repacks — placed at {driveRoot}/Repacks/  (scanner path)
          # These are placeholder archive files so the scanner shows a "Ready to Install" section.
          # File titles match real games in the Games.Database so the detail view enriches correctly.
          sudo mkdir -p "/Repacks"
          printf 'placeholder' | sudo tee "/Repacks/Elden Ring.iso"                      >/dev/null
          printf 'placeholder' | sudo tee "/Repacks/Baldurs Gate 3.zip"                  >/dev/null
          printf 'placeholder' | sudo tee "/Repacks/Cyberpunk 2077.iso"                  >/dev/null
          printf 'placeholder' | sudo tee "/Repacks/God of War.iso"                      >/dev/null
          echo "=== ROMs ===" && find /Roms -type f
          echo "=== Repacks ===" && find /Repacks -type f

      - name: Restore & Publish linux-x64
        run: |
          dotnet restore GameLauncher/GameLauncher.csproj
          dotnet publish GameLauncher/GameLauncher.csproj \
            -c Release -r linux-x64 --self-contained true \
            -p:PublishSingleFile=true -o /tmp/gameos-linux
          cp GameLauncher/gameos-token.dat   /tmp/gameos-linux/ 2>/dev/null || true
          cp GameLauncher/gameos-backend.url /tmp/gameos-linux/ 2>/dev/null || true
          ls -lh /tmp/gameos-linux/GameLauncher

      - name: Start Xvfb + openbox
        run: |
          Xvfb :99 -screen 0 1280x800x24 -ac -noreset &
          sleep 3
          DISPLAY=:99 openbox --config-file /dev/null &
          sleep 2
          DISPLAY=:99 xdpyinfo | grep "name of display"

      - name: Pre-seed auto-login session (GitHub-direct mode)
        run: |
          # In GitHub-direct mode the "token" is just the username — no password
          # required.  TryAutoLoginAsync() will call GetProfileAsync(username) which
          # reads accounts/koriebonx98/profile.json from the data repo using the
          # DATA_REPO_TOKEN already injected into gameos-token.dat.
          # This bypasses the login UI entirely so screenshots show the logged-in state.
          SESSION_DIR="${HOME}/.config/GameOS"
          mkdir -p "${SESSION_DIR}"
          cat > "${SESSION_DIR}/sessions.json" << 'SESSIONEOF'
          [
            {
              "username": "Koriebonx98",
              "email": "",
              "token": "Koriebonx98",
              "avatarColor": "#1e90ff",
              "savedAt": "2026-01-01T00:00:00.0000000Z",
              "rememberMe": true
            }
          ]
          SESSIONEOF
          echo "sessions.json written to ${SESSION_DIR}"
          cat "${SESSION_DIR}/sessions.json"

      - name: Launch and screenshot all pages
        env:
          DISPLAY: ':99'
          GAMEOS_DISABLE_GPU: '1'
          LIBGL_ALWAYS_SOFTWARE: '1'
          GALLIUM_DRIVER: softpipe
        run: |
          mkdir -p /tmp/ss

          # ── Layout constants (1280×800 Xvfb, measured from live screenshots) ──
          # Sidebar nav (220 px wide):
          #   Home:        x=110  y=147
          #   My Library:  x=110  y=200
          #   Games Store: x=110  y=253
          #   Friends:     x=110  y=306
          #   Profile:     x=110  y=359
          #
          # Library content (x starts at 252 = sidebar 220 + StackPanel margin 32):
          #   Game-card col-1 centre: x=337 (card width 170, margin 12)
          #   Repack-card col-1 centre: x=352 (card width 200, margin 10)
          #   ROM-card col-1 centre:   x=337 (card width 170, margin 10)
          #
          # Scroll note: xdotool key Next/End do NOT scroll in Avalonia because the
          # outer ScrollViewer has no keyboard focus after clicking a sidebar button.
          # Fix: hover mouse over content area then use button-5 (wheel-down) events
          # which work regardless of focus.
          #   • 3 wheel clicks ≈ 144 px scroll → "Ready to Install" row visible
          #   • 30 wheel clicks caps at max-scroll (~799 px) → ROMs section visible
          #
          # Repack card (Height=90 image + ~71 info = 161 px total):
          #   After 3×48 px = 144 px scroll: card-top ≈ y=586, card-centre ≈ y=666
          # ROM card (Height=100 image + ~88 info = 188 px total):
          #   After max scroll (799 px): ROM row-1 top ≈ y=178, image-centre ≈ y=228
          #
          # Friends Message button: far-right column of each friend-row, x≈1200
          #   First friend-row centre: y≈190

          cd /tmp/gameos-linux
          ./GameLauncher > /tmp/launcher.log 2>&1 &
          APP=$!
          echo "PID: $APP"

          # Auto-login resolves profile from GitHub; allow 30s for auth + data load
          echo "Waiting for auto-login + data load (30s)…"
          sleep 30

          kill -0 $APP 2>/dev/null || { echo "::error::Launcher crashed"; cat /tmp/launcher.log; exit 1; }

          ss()     { DISPLAY=:99 scrot "$1" && echo "  📸 $1"; sleep 1; }
          # Scroll the main ScrollViewer using mouse-wheel events (button 5 = wheel-down).
          # The mouse must be over the content area; no keyboard focus required.
          wheel_down() {
            local n=${1:-3}
            DISPLAY=:99 xdotool mousemove 750 400
            for i in $(seq 1 "$n"); do DISPLAY=:99 xdotool click 5; sleep 0.08; done
          }

          # 01 Dashboard — auto-login lands here (no login screen shown)
          ss /tmp/ss/01-dashboard.png
          sleep 2

          # 02 My Games (Library) — nav button at x=110, y=200
          DISPLAY=:99 xdotool mousemove 110 200 click 1
          sleep 10
          ss /tmp/ss/02-my-games.png

          # 03 Ready to Install (Repacks section)
          # 3 wheel-down events ≈ 144 px → brings "Ready to Install" row into view
          wheel_down 3
          sleep 1
          ss /tmp/ss/03-repacks-ready-to-install.png

          # 04 Repack Detail — click the first repack card
          # col-1 x=352; after 144 px scroll, repack card-centre ≈ y=666
          DISPLAY=:99 xdotool mousemove 352 666 click 1
          sleep 6
          ss /tmp/ss/04-repack-detail.png

          # Close detail (Back button shown; Escape also works in Avalonia overlay)
          DISPLAY=:99 xdotool key Escape
          sleep 1

          # 05 ROM Detection — back to library, then scroll to very bottom
          # 30 wheel-down events caps at max-scroll (~799 px); ROMs section visible
          DISPLAY=:99 xdotool mousemove 110 200 click 1
          sleep 3
          wheel_down 30
          sleep 1
          ss /tmp/ss/05-roms-detected.png

          # 06 ROM Detail — click the first ROM card
          # col-1 x=337; after max scroll, ROM row-1 image-centre ≈ y=228
          DISPLAY=:99 xdotool mousemove 337 228 click 1
          sleep 5
          ss /tmp/ss/06-rom-detail.png

          # Close detail
          DISPLAY=:99 xdotool key Escape
          sleep 1

          # 07 Games Store — nav at x=110, y=253
          DISPLAY=:99 xdotool mousemove 110 253 click 1
          sleep 10
          ss /tmp/ss/07-games-store.png

          # 08 App Store tab (inside store page) ≈x=420, y=155
          DISPLAY=:99 xdotool mousemove 420 155 click 1
          sleep 5
          ss /tmp/ss/08-app-store.png

          # 09 Friends — nav at x=110, y=306
          # Increased wait: FriendsViewModel.LoadAsync() fetches friends list via
          # GitHub API (multiple calls); 15 s gives the data time to arrive on Linux
          DISPLAY=:99 xdotool mousemove 110 306 click 1
          sleep 15
          ss /tmp/ss/09-friends.png

          # 10 Friends conversation — click first friend's 💬 Message button
          # The button is in Grid.Column="3" (far-right) of the friend-row.
          # Content-area starts at x=252; row is full-width; Message button ≈ x=1200.
          # First friend-row centre ≈ y=190 (after Friends header + section header).
          DISPLAY=:99 xdotool mousemove 1200 190 click 1
          sleep 5
          ss /tmp/ss/10-friends-conversation.png

          # 11 Profile — nav at x=110, y=359
          DISPLAY=:99 xdotool mousemove 110 359 click 1
          sleep 5
          ss /tmp/ss/11-profile.png

          echo "=== Linux screenshots ==="
          ls -lh /tmp/ss/

      - name: Upload Linux screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: screenshots-linux
          path: /tmp/ss/
          retention-days: 7

      - name: Upload launcher log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: linux-launcher-log
          path: /tmp/launcher.log
          retention-days: 7

# ─────────────────────────────────────────────────────────────────────────────
# macOS  (native Quartz · screencapture · osascript)
# ─────────────────────────────────────────────────────────────────────────────
  mac-screenshots:
    name: Screenshot — macOS
    runs-on: macos-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Inject auth credentials
        env:
          DATA_REPO_TOKEN:    ${{ secrets.DATA_REPO_TOKEN }}
          GAMEOS_BACKEND_URL: ${{ secrets.GAMEOS_BACKEND_URL }}
        run: |
          python3 << 'PYEOF'
          import os
          token   = os.environ.get('DATA_REPO_TOKEN', '')
          XOR_KEY = b'GameOS_KEY'
          if token:
              tok_bytes = token.encode('utf-8')
              encoded   = ''.join(f'{b ^ XOR_KEY[i % len(XOR_KEY)]:02x}' for i, b in enumerate(tok_bytes))
              with open('GameLauncher/gameos-token.dat', 'w') as f:
                  f.write(encoded)
              print(f'token injected ({len(encoded)} chars)')
          url = os.environ.get('GAMEOS_BACKEND_URL', '').strip().rstrip('/')
          if url:
              with open('GameLauncher/gameos-backend.url', 'w') as f:
                  f.write(url)
              print(f'backend url: {url}')
          PYEOF

      - name: Create placeholder ROM and Repack files for scanner detection
        run: |
          # macOS root filesystem (/) is read-only (SIP).
          # Create a 100 MB HFS+ RAM disk so the scanner picks it up via /Volumes/*.
          # Strip trailing whitespace from hdiutil output (it pads the device path).
          DISK=$(hdiutil attach -nomount ram://204800 | xargs)
          diskutil eraseDisk HFS+ GameOS "${DISK}"
          DRIVE=/Volumes/GameOS

          # ROMs — {DRIVE}/Roms/{Platform}/Games/
          mkdir -p "${DRIVE}/Roms/Xbox 360/Games"
          printf 'placeholder' > "${DRIVE}/Roms/Xbox 360/Games/Halo 3.iso"
          printf 'placeholder' > "${DRIVE}/Roms/Xbox 360/Games/Gears of War.iso"
          printf 'placeholder' > "${DRIVE}/Roms/Xbox 360/Games/Forza Motorsport 4.iso"
          printf 'placeholder' > "${DRIVE}/Roms/Xbox 360/Games/Halo Reach.iso"
          printf 'placeholder' > "${DRIVE}/Roms/Xbox 360/Games/Red Dead Redemption.iso"
          mkdir -p "${DRIVE}/Roms/PS3/Games"
          printf 'placeholder' > "${DRIVE}/Roms/PS3/Games/God of War III.iso"
          printf 'placeholder' > "${DRIVE}/Roms/PS3/Games/Uncharted 2.iso"
          printf 'placeholder' > "${DRIVE}/Roms/PS3/Games/The Last of Us.iso"
          mkdir -p "${DRIVE}/Roms/Switch/Games"
          printf 'placeholder' > "${DRIVE}/Roms/Switch/Games/Breath of the Wild.nsp"
          printf 'placeholder' > "${DRIVE}/Roms/Switch/Games/Mario Kart 8 Deluxe.nsp"
          mkdir -p "${DRIVE}/Roms/PS4/Games"
          printf 'placeholder' > "${DRIVE}/Roms/PS4/Games/God of War.pkg"
          # Repacks — {DRIVE}/Repacks/
          mkdir -p "${DRIVE}/Repacks"
          printf 'placeholder' > "${DRIVE}/Repacks/Elden Ring.iso"
          printf 'placeholder' > "${DRIVE}/Repacks/Baldurs Gate 3.zip"
          printf 'placeholder' > "${DRIVE}/Repacks/Cyberpunk 2077.iso"
          printf 'placeholder' > "${DRIVE}/Repacks/God of War.iso"
          echo "=== ROMs ===" && find "${DRIVE}/Roms" -type f
          echo "=== Repacks ===" && find "${DRIVE}/Repacks" -type f

      - name: Restore & Publish osx-arm64
        run: |
          dotnet restore GameLauncher/GameLauncher.csproj
          dotnet publish GameLauncher/GameLauncher.csproj \
            -c Release -r osx-arm64 --self-contained true \
            -p:PublishSingleFile=true -o /tmp/gameos-mac
          cp GameLauncher/gameos-token.dat   /tmp/gameos-mac/ 2>/dev/null || true
          cp GameLauncher/gameos-backend.url /tmp/gameos-mac/ 2>/dev/null || true
          ls -lh /tmp/gameos-mac/GameLauncher

      - name: Pre-seed auto-login session (GitHub-direct mode)
        run: |
          # macOS ApplicationData = ~/Library/Application Support
          SESSION_DIR="${HOME}/Library/Application Support/GameOS"
          mkdir -p "${SESSION_DIR}"
          cat > "${SESSION_DIR}/sessions.json" << 'SESSIONEOF'
          [
            {
              "username": "Koriebonx98",
              "email": "",
              "token": "Koriebonx98",
              "avatarColor": "#1e90ff",
              "savedAt": "2026-01-01T00:00:00.0000000Z",
              "rememberMe": true
            }
          ]
          SESSIONEOF
          echo "sessions.json written to ${SESSION_DIR}"
          cat "${SESSION_DIR}/sessions.json"

      - name: Launch and screenshot all pages
        env:
          GAMEOS_DISABLE_GPU:           '1'
          AVALONIA_USE_RASTER_RENDERER: '1'
        run: |
          mkdir -p /tmp/ss
          chmod +x /tmp/gameos-mac/GameLauncher
          /tmp/gameos-mac/GameLauncher > /tmp/launcher.log 2>&1 &
          APP=$!
          echo "PID: $APP"

          # Auto-login resolves profile from GitHub; allow 30s for auth + data load
          echo "Waiting for auto-login + data load (30s)…"
          sleep 30
          kill -0 $APP 2>/dev/null || { echo "::error::Launcher crashed"; cat /tmp/launcher.log; exit 1; }

          tap()  { osascript -e "tell application \"System Events\" to key code $1" 2>/dev/null || true; }
          ss()   { screencapture -x "$1" && echo "  📸 $1"; sleep 1; }
          # Key codes: 48=Tab 36=Return 53=Escape

          # Scroll the main ScrollViewer AND click at screen coordinates via Quartz.
          # tap key-code 121 (PageDown) / 119 (End) do NOT scroll because the outer
          # ScrollViewer has no keyboard focus after Tab-navigating the sidebar.
          # "osascript click at {x,y}" is not a valid System Events command.
          # CGEvent APIs work regardless of focus and use the same coordinate space
          # as screencapture (screen coords, top-left origin, y increases downward).
          mac_wheel_down() {
            local n=${1:-3} px=${2:-48}
            python3 - "$n" "$px" << 'PYEOF'
          import sys, time, Quartz
          n, px = int(sys.argv[1]), int(sys.argv[2])
          for _ in range(n):
              ev = Quartz.CGEventCreateScrollWheelEvent(
                      None, Quartz.kCGScrollEventUnitPixel, 1, -px)
              Quartz.CGEventPost(Quartz.kCGHIDEventTap, ev)
              time.sleep(0.08)
          PYEOF
          }
          mac_click() {
            local x=$1 y=$2
            python3 - "$x" "$y" << 'PYEOF'
          import sys, time, Quartz
          x, y = int(sys.argv[1]), int(sys.argv[2])
          dn = Quartz.CGEventCreateMouseEvent(
                  None, Quartz.kCGEventLeftMouseDown, (x, y), Quartz.kCGMouseButtonLeft)
          up = Quartz.CGEventCreateMouseEvent(
                  None, Quartz.kCGEventLeftMouseUp,   (x, y), Quartz.kCGMouseButtonLeft)
          Quartz.CGEventPost(Quartz.kCGHIDEventTap, dn)
          time.sleep(0.05)
          Quartz.CGEventPost(Quartz.kCGHIDEventTap, up)
          PYEOF
          }

          # 01 Dashboard — auto-login lands here (no login screen shown)
          ss /tmp/ss/01-dashboard.png
          sleep 2

          # 02 My Library — sidebar nav item 2
          tap 53; sleep 0.3  # Escape to clear any focus
          for i in $(seq 1 2); do tap 48; sleep 0.2; done; tap 36; sleep 10
          ss /tmp/ss/02-my-games.png

          # 03 Ready to Install (Repacks section)
          # 3 wheel-down events × 48 px = 144 px → brings repack row into view
          mac_wheel_down 3 48
          sleep 1
          ss /tmp/ss/03-repacks-ready-to-install.png

          # 04 Repack Detail — click first repack card
          # col-1 x=352; after 144 px scroll, repack card-centre ≈ y=666
          mac_click 352 666; sleep 6
          ss /tmp/ss/04-repack-detail.png
          tap 53; sleep 0.4  # close detail

          # 05 ROMs — back to library, scroll to very bottom (ROMs section)
          # 30 wheel-down events caps at max-scroll (~799 px); ROMs visible from y≈130
          tap 53; sleep 0.3
          for i in $(seq 1 2); do tap 48; sleep 0.2; done; tap 36; sleep 4
          mac_wheel_down 30 48
          sleep 1
          ss /tmp/ss/05-roms-detected.png

          # 06 ROM Detail — click first ROM card
          # col-1 x=337; after max scroll, ROM row-1 image-centre ≈ y=228
          mac_click 337 228; sleep 5
          ss /tmp/ss/06-rom-detail.png
          tap 53; sleep 0.4

          # 07 Games Store
          tap 53; sleep 0.3
          for i in $(seq 1 3); do tap 48; sleep 0.2; done; tap 36; sleep 10
          ss /tmp/ss/07-games-store.png
          tap 48; sleep 0.4; tap 36; sleep 5
          ss /tmp/ss/08-app-store.png

          # 09 Friends — increased wait for GitHub API data load
          tap 53; sleep 0.3
          for i in $(seq 1 4); do tap 48; sleep 0.2; done; tap 36; sleep 15
          ss /tmp/ss/09-friends.png

          # 10 Friends conversation — click first friend's 💬 Message button
          # Button is in far-right column of each friend row (x≈1200, y≈190)
          mac_click 1200 190; sleep 5
          ss /tmp/ss/10-friends-conversation.png

          # 11 Profile
          tap 53; sleep 0.3
          for i in $(seq 1 5); do tap 48; sleep 0.2; done; tap 36; sleep 5
          ss /tmp/ss/11-profile.png

          echo "=== macOS screenshots ===" && ls -lh /tmp/ss/

      - name: Upload macOS screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: screenshots-mac
          path: /tmp/ss/
          retention-days: 7

      - name: Upload launcher log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mac-launcher-log
          path: /tmp/launcher.log
          retention-days: 7

# ─────────────────────────────────────────────────────────────────────────────
# WINDOWS  (Win32 · System.Drawing · SendKeys)
# ─────────────────────────────────────────────────────────────────────────────
  windows-screenshots:
    name: Screenshot — Windows
    runs-on: windows-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Inject auth credentials
        shell: pwsh
        env:
          DATA_REPO_TOKEN:    ${{ secrets.DATA_REPO_TOKEN }}
          GAMEOS_BACKEND_URL: ${{ secrets.GAMEOS_BACKEND_URL }}
        run: |
          $token  = $env:DATA_REPO_TOKEN
          $xorKey = [byte[]][System.Text.Encoding]::UTF8.GetBytes('GameOS_KEY')
          if ($token) {
              $bytes   = [System.Text.Encoding]::UTF8.GetBytes($token)
              $encoded = -join (0..($bytes.Length-1) | ForEach-Object { '{0:x2}' -f ($bytes[$_] -bxor $xorKey[$_ % $xorKey.Length]) })
              Set-Content 'GameLauncher\gameos-token.dat' $encoded
              Write-Host "token injected ($($encoded.Length) chars)"
          }
          $url = ($env:GAMEOS_BACKEND_URL ?? '').Trim().TrimEnd('/')
          if ($url) { Set-Content 'GameLauncher\gameos-backend.url' $url; Write-Host "backend url: $url" }

      - name: Create placeholder ROM and Repack files for scanner detection
        shell: pwsh
        run: |
          # ROMs — C:\Roms\{Platform}\Games\ (scanner scans C:\ on Windows)
          New-Item -ItemType Directory -Force 'C:\Roms\Xbox 360\Games' | Out-Null
          'placeholder' | Set-Content 'C:\Roms\Xbox 360\Games\Halo 3.iso'
          'placeholder' | Set-Content 'C:\Roms\Xbox 360\Games\Gears of War.iso'
          'placeholder' | Set-Content 'C:\Roms\Xbox 360\Games\Forza Motorsport 4.iso'
          'placeholder' | Set-Content 'C:\Roms\Xbox 360\Games\Halo Reach.iso'
          'placeholder' | Set-Content 'C:\Roms\Xbox 360\Games\Red Dead Redemption.iso'
          New-Item -ItemType Directory -Force 'C:\Roms\PS3\Games' | Out-Null
          'placeholder' | Set-Content 'C:\Roms\PS3\Games\God of War III.iso'
          'placeholder' | Set-Content 'C:\Roms\PS3\Games\Uncharted 2.iso'
          'placeholder' | Set-Content 'C:\Roms\PS3\Games\The Last of Us.iso'
          New-Item -ItemType Directory -Force 'C:\Roms\Switch\Games' | Out-Null
          'placeholder' | Set-Content 'C:\Roms\Switch\Games\Breath of the Wild.nsp'
          'placeholder' | Set-Content 'C:\Roms\Switch\Games\Mario Kart 8 Deluxe.nsp'
          New-Item -ItemType Directory -Force 'C:\Roms\PS4\Games' | Out-Null
          'placeholder' | Set-Content 'C:\Roms\PS4\Games\God of War.pkg'
          # Repacks — C:\Repacks\ (scanner scans C:\ on Windows)
          New-Item -ItemType Directory -Force 'C:\Repacks' | Out-Null
          'placeholder' | Set-Content 'C:\Repacks\Elden Ring.iso'
          'placeholder' | Set-Content 'C:\Repacks\Baldurs Gate 3.zip'
          'placeholder' | Set-Content 'C:\Repacks\Cyberpunk 2077.iso'
          'placeholder' | Set-Content 'C:\Repacks\God of War.iso'
          Write-Host "=== ROMs ===" && Get-ChildItem -Recurse 'C:\Roms' | Select-Object FullName
          Write-Host "=== Repacks ===" && Get-ChildItem 'C:\Repacks' | Select-Object FullName

      - name: Restore & Publish win-x64
        shell: pwsh
        run: |
          dotnet restore GameLauncher/GameLauncher.csproj
          dotnet publish GameLauncher/GameLauncher.csproj `
            -c Release -r win-x64 --self-contained true `
            -p:PublishSingleFile=false `
            -o C:\gameos-win
          Copy-Item 'GameLauncher\gameos-token.dat'   'C:\gameos-win\' -ErrorAction SilentlyContinue
          Copy-Item 'GameLauncher\gameos-backend.url' 'C:\gameos-win\' -ErrorAction SilentlyContinue
          Get-ChildItem 'C:\gameos-win\GameLauncher.exe'

      - name: Pre-seed auto-login session (GitHub-direct mode)
        shell: pwsh
        run: |
          # Windows ApplicationData = %APPDATA%
          $sessionDir = Join-Path $env:APPDATA 'GameOS'
          New-Item -ItemType Directory -Force $sessionDir | Out-Null
          $session = @(
            [ordered]@{
              username    = 'Koriebonx98'
              email       = ''
              token       = 'Koriebonx98'
              avatarColor = '#1e90ff'
              savedAt     = '2026-01-01T00:00:00.0000000Z'
              rememberMe  = $true
            }
          )
          $json = ConvertTo-Json -InputObject $session -Depth 5
          Set-Content (Join-Path $sessionDir 'sessions.json') $json
          Write-Host "sessions.json written to $sessionDir"
          Get-Content (Join-Path $sessionDir 'sessions.json')

      - name: Launch and screenshot all pages
        shell: pwsh
        env:
          GAMEOS_DISABLE_GPU:           '1'
          AVALONIA_USE_RASTER_RENDERER: '1'
        run: |
          $ssDir = 'C:\tmp\ss'
          New-Item -ItemType Directory -Force $ssDir, 'C:\tmp' | Out-Null

          Add-Type -AssemblyName System.Windows.Forms
          Add-Type -AssemblyName System.Drawing

          # P/Invoke helpers — placed in a single-line string to avoid YAML
          # block-scalar indentation issues with PowerShell @'...'@ here-strings.
          # SendKeys {PGDN}/{END} do NOT scroll Avalonia's ScrollViewer because focus
          # stays on the last-clicked sidebar button, not the viewer itself.
          Add-Type -TypeDefinition 'using System.Runtime.InteropServices; public class GameOSMouse { [DllImport("user32.dll")] public static extern bool SetCursorPos(int x, int y); [DllImport("user32.dll")] public static extern void mouse_event(uint f, int dx, int dy, int d, int e); public const uint WHEEL=0x800,LDOWN=0x0002,LUP=0x0004; public static void ScrollDown(int n){SetCursorPos(750,400);for(int i=0;i<n;i++){mouse_event(WHEEL,0,0,-120,0);System.Threading.Thread.Sleep(80);}} public static void ClickAt(int x,int y){SetCursorPos(x,y);System.Threading.Thread.Sleep(100);mouse_event(LDOWN,0,0,0,0);mouse_event(LUP,0,0,0,0);}}'

          function ss([string]$path) {
              $s = [System.Windows.Forms.Screen]::PrimaryScreen.Bounds
              $b = New-Object System.Drawing.Bitmap($s.Width, $s.Height)
              $g = [System.Drawing.Graphics]::FromImage($b)
              $g.CopyFromScreen($s.Location, [System.Drawing.Point]::Empty, $s.Size)
              $b.Save($path); $g.Dispose(); $b.Dispose()
              Write-Host "  📸 $path"; Start-Sleep -Seconds 1
          }
          function keys([string]$k) {
              [System.Windows.Forms.SendKeys]::SendWait($k)
              [System.Windows.Forms.Application]::DoEvents()
          }

          $proc = Start-Process 'C:\gameos-win\GameLauncher.exe' -PassThru `
              -RedirectStandardOutput 'C:\tmp\stdout.log' `
              -RedirectStandardError  'C:\tmp\stderr.log'
          Write-Host "PID: $($proc.Id)"

          # Auto-login resolves profile from GitHub; allow 30s for auth + data load
          Write-Host "Waiting for auto-login + data load (30s)…"
          Start-Sleep -Seconds 30
          if ($proc.HasExited) { Write-Host "::error::Launcher crashed"; Get-Content 'C:\tmp\stderr.log' -EA SilentlyContinue; exit 1 }

          try { $sh = New-Object -ComObject WScript.Shell; $sh.AppActivate($proc.MainWindowTitle) | Out-Null } catch {}
          Start-Sleep -Milliseconds 600

          # 01 Dashboard — auto-login lands here (no login screen shown)
          ss "$ssDir\01-dashboard.png"
          Start-Sleep -Seconds 2

          # 02 My Library — sidebar nav item 2
          1..2 | ForEach-Object { keys "{TAB}"; Start-Sleep -Milliseconds 200 }
          keys "{ENTER}"; Start-Sleep -Seconds 10
          ss "$ssDir\02-my-games.png"

          # 03 Ready to Install (Repacks section)
          # 3 wheel-detents × ~48 px = ~144 px → brings repack row into view
          [GameOSMouse]::ScrollDown(3); Start-Sleep -Seconds 1
          ss "$ssDir\03-repacks-ready-to-install.png"

          # 04 Repack Detail — click first repack card
          # col-1 x=352; after ~144 px scroll, repack card-centre ≈ y=666
          [GameOSMouse]::ClickAt(352, 666); Start-Sleep -Seconds 6
          ss "$ssDir\04-repack-detail.png"
          keys "{ESC}"; Start-Sleep -Milliseconds 400

          # 05 ROMs — back to library, scroll to very bottom (ROMs section)
          # 30 wheel-detents caps at max-scroll (~799 px); ROMs visible from y≈130
          1..2 | ForEach-Object { keys "{TAB}"; Start-Sleep -Milliseconds 200 }
          keys "{ENTER}"; Start-Sleep -Seconds 4
          [GameOSMouse]::ScrollDown(30); Start-Sleep -Seconds 1
          ss "$ssDir\05-roms-detected.png"

          # 06 ROM detail — click first ROM card
          # col-1 x=337; after max scroll, ROM row-1 image-centre ≈ y=228
          [GameOSMouse]::ClickAt(337, 228); Start-Sleep -Seconds 5
          ss "$ssDir\06-rom-detail.png"
          keys "{ESC}"; Start-Sleep -Milliseconds 400

          # 07 Games Store — sidebar nav item 3
          1..3 | ForEach-Object { keys "{TAB}"; Start-Sleep -Milliseconds 200 }
          keys "{ENTER}"; Start-Sleep -Seconds 10
          ss "$ssDir\07-games-store.png"
          # 08 App Store tab
          keys "{TAB}"; Start-Sleep -Milliseconds 400; keys "{ENTER}"; Start-Sleep -Seconds 5
          ss "$ssDir\08-app-store.png"

          # 09 Friends — sidebar nav item 4
          # Increased wait: LoadAsync() fetches friends via GitHub API (multiple calls)
          1..4 | ForEach-Object { keys "{TAB}"; Start-Sleep -Milliseconds 200 }
          keys "{ENTER}"; Start-Sleep -Seconds 15
          ss "$ssDir\09-friends.png"

          # 10 Friends conversation — click first friend's 💬 Message button
          # Button is in far-right column of each friend row (x≈1200, y≈190)
          [GameOSMouse]::ClickAt(1200, 190); Start-Sleep -Seconds 5
          ss "$ssDir\10-friends-conversation.png"

          # 11 Profile — sidebar nav item 5
          1..5 | ForEach-Object { keys "{TAB}"; Start-Sleep -Milliseconds 200 }
          keys "{ENTER}"; Start-Sleep -Seconds 5
          ss "$ssDir\11-profile.png"

          Write-Host "=== Windows screenshots ===" && Get-ChildItem $ssDir | Select-Object Name, Length

      - name: Upload Windows screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: screenshots-windows
          path: C:\tmp\ss\
          retention-days: 7

      - name: Upload launcher logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: windows-launcher-logs
          path: |
            C:\tmp\stdout.log
            C:\tmp\stderr.log
          retention-days: 7

# ─────────────────────────────────────────────────────────────────────────────
# COMMIT  — download artifacts → commit to Screenshots/{Linux,Mac,Windows}/
# ─────────────────────────────────────────────────────────────────────────────
  commit-screenshots:
    name: Commit screenshots
    runs-on: ubuntu-latest
    needs: [linux-screenshots, mac-screenshots, windows-screenshots]
    if: always()
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}

      - name: Download Linux screenshots
        uses: actions/download-artifact@v4
        with:
          name: screenshots-linux
          path: Screenshots/Linux/
        continue-on-error: true

      - name: Download macOS screenshots
        uses: actions/download-artifact@v4
        with:
          name: screenshots-mac
          path: Screenshots/Mac/
        continue-on-error: true

      - name: Download Windows screenshots
        uses: actions/download-artifact@v4
        with:
          name: screenshots-windows
          path: Screenshots/Windows/
        continue-on-error: true

      - name: List screenshots
        run: |
          echo "=== Linux ==="   && ls -lh Screenshots/Linux/   2>/dev/null || echo "(none)"
          echo "=== Mac ====="   && ls -lh Screenshots/Mac/     2>/dev/null || echo "(none)"
          echo "=== Windows ===" && ls -lh Screenshots/Windows/ 2>/dev/null || echo "(none)"

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Screenshots/
          if git diff --staged --quiet; then
            echo "No new screenshots to commit."
          else
            COUNT=$(git diff --staged --name-only | wc -l)
            git commit -m "ci: update $COUNT launcher screenshots (Linux · Mac · Windows) [skip ci]"
            git push
          fi
