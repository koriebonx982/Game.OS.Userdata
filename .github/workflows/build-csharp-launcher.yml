# Build & Live-Login Test — C# Game Launcher
#
# Builds the C# launcher and runs the LoginAuth.Tests suite, including:
#   Test 5 — GitHub-direct login (requires DATA_REPO_TOKEN + GAMEOS_TEST_PASSWORD)
#   Test 6 — Backend REST API login (requires GAMEOS_BACKEND_URL + GAMEOS_TEST_PASSWORD)
#
# Both tests verify that Koriebonx98 can log in successfully.
# Tests 1–4 (PBKDF2 hash parity, bcrypt detection) always run without secrets.
#
# Pre-built EXE (Windows x64):
#   The workflow publishes a self-contained single-file Windows exe with the
#   backend URL baked in (via gameos-backend.url) so it works immediately on
#   launch — no environment variables or PAT setup required.
#
# Visual Studio (developer builds from source):
#   GameLauncher/Properties/launchSettings.json sets GAMEOS_BACKEND_URL=http://localhost:3000
#   automatically when running with VS or `dotnet run` — no manual env-var setup needed.
#   Start the local backend first:  cd backend && npm install && node index.js
#   Then press ▶ in Visual Studio (or run `dotnet run`) and sign in normally.
#
# Injection at build time:
#   gameos-token.dat  — DATA_REPO_TOKEN XOR-encoded (GitHub-direct auth)
#   gameos-backend.url — GAMEOS_BACKEND_URL written as plain text (backend mode)
#   Both files are empty placeholders committed to the repo; the real values
#   only exist inside the CI runner during the build.
#
# Triggers:
#   • Manual (workflow_dispatch) — run from the Actions tab at any time
#   • Push to main — so every merge is validated end-to-end
#
# Required secrets (set in Settings → Secrets and variables → Actions):
#   DATA_REPO_TOKEN       — fine-grained PAT with Contents read+write on
#                           the private data repository (already used by
#                           deploy.yml; no new secret needed if it is set)
#   GAMEOS_BACKEND_URL    — URL of the deployed Node.js backend server
#                           (e.g. https://gameos.up.railway.app)
#                           Baked into the exe so users never need to set env vars
#   GAMEOS_TEST_PASSWORD  — password for the Koriebonx98 test account

name: Build & Live-Login Test (C# Launcher)

on:
  push:
    branches: [main]
    paths:
      - 'GameLauncher/**'
      - 'LoginAuth.Tests/**'
      - '.github/workflows/build-csharp-launcher.yml'
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-test:
    name: Build + Auth Tests (including live login)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # ── Token injection (mirrors deploy.yml's GITHUB_TOKEN_ENCODED injection) ──
      - name: Inject token into gameos-token.dat
        # Encodes DATA_REPO_TOKEN with XOR key "GameOS_KEY" and writes it to the
        # placeholder file.  The launcher reads this file at startup using the same
        # DecodeXorToken() method (mirroring the JS decoder in script.js).
        # If DATA_REPO_TOKEN is not set, the file stays empty and the launcher falls
        # back to GAMEOS_GITHUB_TOKEN env var (no error — Tests 1–4 still pass).
        env:
          DATA_REPO_TOKEN: ${{ secrets.DATA_REPO_TOKEN }}
        run: |
          python3 << 'PYEOF'
          import os

          token = os.environ.get('DATA_REPO_TOKEN', '')
          XOR_KEY = b'GameOS_KEY'

          if token:
              tok_bytes = token.encode('utf-8')
              encoded = ''.join(
                  f'{b ^ XOR_KEY[i % len(XOR_KEY)]:02x}'
                  for i, b in enumerate(tok_bytes)
              )
              with open('GameLauncher/gameos-token.dat', 'w') as f:
                  f.write(encoded)
              print(f'✅ Token injected into GameLauncher/gameos-token.dat ({len(encoded)} hex chars)')
              print('   Encoding: XOR-hex with key "GameOS_KEY" — same as GITHUB_TOKEN_ENCODED in script.js')
          else:
              print('ℹ  DATA_REPO_TOKEN not set — gameos-token.dat left empty')
              print('   Launcher will fall back to GAMEOS_GITHUB_TOKEN env var')
              print('   To enable live login, add DATA_REPO_TOKEN as a repository secret.')
          PYEOF

      # ── Backend URL injection ──────────────────────────────────────────────
      - name: Inject backend URL into gameos-backend.url
        # Writes the deployed backend URL into the placeholder file so the launcher
        # connects to the backend out of the box — no env var setup required by end users.
        # If GAMEOS_BACKEND_URL is not set, the file stays empty and the launcher
        # falls back to GitHub-direct mode (gameos-token.dat).
        env:
          GAMEOS_BACKEND_URL: ${{ secrets.GAMEOS_BACKEND_URL }}
        run: |
          python3 << 'PYEOF'
          import os

          url = os.environ.get('GAMEOS_BACKEND_URL', '').strip().rstrip('/')

          if url:
              with open('GameLauncher/gameos-backend.url', 'w') as f:
                  f.write(url)
              print(f'✅ Backend URL injected into GameLauncher/gameos-backend.url')
              print(f'   URL: {url}')
              print('   The launcher will use backend mode automatically — no env vars needed.')
          else:
              print('ℹ  GAMEOS_BACKEND_URL not set — gameos-backend.url left empty')
              print('   Launcher will fall back to GitHub-direct mode (gameos-token.dat).')
              print('   To enable backend mode, add GAMEOS_BACKEND_URL as a repository secret.')
          PYEOF

      # ── Set up Node.js for local backend server ──────────────────────────
      - name: Set up Node.js 22 (for local backend)
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci --ignore-scripts

      # ── Start the Game.OS backend server locally ───────────────────────────
      # Uses DATA_REPO_TOKEN as the GitHub PAT so the backend can read/write
      # account data from the private data repository — exactly the same way
      # the deployed backend works in production.
      #
      # The backend automatically creates the Admin.GameOS account on first startup
      # using ADMIN_GAMEOS_PASSWORD (default: "GameOS2026").  Test 7 then logs in
      # as Admin.GameOS to prove the C# launcher can authenticate via the backend API.
      - name: Start Game.OS backend server (local, port 3000)
        env:
          GITHUB_TOKEN:          ${{ secrets.DATA_REPO_TOKEN }}
          REPO_OWNER:            Koriebonx98
          REPO_NAME:             Game.OS.Private.Data
          ADMIN_GAMEOS_PASSWORD: GameOS2026
          PORT:                  3000
        run: |
          if [ -z "$GITHUB_TOKEN" ]; then
            echo "ℹ  DATA_REPO_TOKEN not set — skipping local backend startup."
            echo "   Test 7 (backend API login) will be skipped."
            echo "BACKEND_STARTED=false" >> "$GITHUB_ENV"
            exit 0
          fi

          # Generate a random HMAC secret for this CI run (never reused, never stored)
          export TOKEN_HMAC_SECRET="$(openssl rand -hex 32)"

          cd backend
          nohup node index.js > /tmp/backend.log 2>&1 &
          BACKEND_PID=$!
          echo "$BACKEND_PID" > /tmp/backend.pid
          echo "  Backend PID: $BACKEND_PID"

          # Wait up to 30 seconds for the /health endpoint to respond
          SERVER_READY=false
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000/health > /dev/null 2>&1; then
              echo "✅ Backend server is ready at http://localhost:3000 (after ${i}s)"
              SERVER_READY=true
              break
            fi
            sleep 1
          done

          if [ "$SERVER_READY" = "true" ]; then
            echo "BACKEND_STARTED=true" >> "$GITHUB_ENV"
          else
            echo "❌ Backend did not start within 30 seconds — check /tmp/backend.log"
            cat /tmp/backend.log || true
            echo "BACKEND_STARTED=false" >> "$GITHUB_ENV"
            exit 1
          fi

      # ── Build ──────────────────────────────────────────────────────────────
      - name: Restore dependencies
        run: dotnet restore Game.OS.Userdata.sln

      - name: Build GameLauncher
        run: dotnet build GameLauncher/GameLauncher.csproj -c Release --no-restore

      - name: Build GameScanner.Tests
        run: dotnet build GameScanner.Tests/GameScanner.Tests.csproj -c Release --no-restore

      - name: Build LoginAuth.Tests
        run: dotnet build LoginAuth.Tests/LoginAuth.Tests.csproj -c Release --no-restore

      # ── Game scanner tests (Steam/Epic/GOG/Xbox/ROM detection) ────────────
      - name: Run GameScanner.Tests — storefront detection (Steam VDF, Epic manifests, GOG, Xbox, ROMs)
        run: |
          dotnet run --project GameScanner.Tests -c Release --no-build
          echo "✅ Game scanner tests passed — all storefronts and ROM platforms detected correctly"

      # ── Unit / hash-parity tests (no network required) ────────────────────
      - name: Run LoginAuth.Tests (hash-parity + bcrypt checks)
        run: dotnet run --project LoginAuth.Tests -c Release --no-build
        # Tests 1–4 pass without any secrets (pure crypto logic).
        # Tests 5–7 are automatically skipped when the relevant tokens are not set.

      # ── Live login tests against local backend ────────────────────────────
      # Test 5: GitHub-direct login (requires DATA_REPO_TOKEN)
      # Test 6: Backend REST API login with GAMEOS_TEST_USERNAME/PASSWORD
      # Test 7: Backend API login using Admin.GameOS (backend auto-creates this account)
      #         This test PROVES the C# app can log in via the backend API without
      #         needing any extra secrets — the backend creates Admin.GameOS on startup.
      - name: Run live login tests — backend API (Admin.GameOS)
        env:
          GAMEOS_GITHUB_TOKEN:   ${{ secrets.DATA_REPO_TOKEN }}
          GAMEOS_BACKEND_URL:    http://localhost:3000
          GAMEOS_TEST_USERNAME:  Koriebonx98
          GAMEOS_TEST_PASSWORD:  ${{ secrets.GAMEOS_TEST_PASSWORD }}
          ADMIN_GAMEOS_PASSWORD: GameOS2026
        run: |
          echo "═══════════════════════════════════════════════════════════"
          echo "  Live login tests — backend API + Admin.GameOS account"
          echo "  Test 5: GitHub-direct   (DATA_REPO_TOKEN → gameos-token.dat)"
          echo "  Test 6: Backend REST API (GAMEOS_TEST_USERNAME + GAMEOS_TEST_PASSWORD)"
          echo "  Test 7: Admin.GameOS    (backend auto-creates account, no extra secrets)"
          echo "  Backend: http://localhost:3000"
          echo "═══════════════════════════════════════════════════════════"
          dotnet run --project LoginAuth.Tests -c Release --no-build \
            2>&1 | tee /tmp/login-test-output.txt

      # ── Stop local backend ─────────────────────────────────────────────────
      - name: Stop local backend server
        if: always()
        run: |
          if [ -f /tmp/backend.pid ]; then
            BACKEND_PID=$(cat /tmp/backend.pid)
            if kill "$BACKEND_PID" 2>/dev/null; then
              echo "✅ Backend server (PID $BACKEND_PID) stopped"
            else
              echo "ℹ  Backend server already stopped"
            fi
          fi

      # ── GUI screenshot capture ────────────────────────────────────────────
      # Captures screenshots of the C# launcher running on Linux/Xvfb.
      # Starts the local backend (if DATA_REPO_TOKEN is set) to allow Admin.GameOS
      # auto-login (via pre-seeded session file) so every screen can be shown.
      # Screenshots are uploaded as an artifact for review.
      - name: Capture GUI screenshots (Xvfb + local backend)
        if: env.BACKEND_STARTED == 'true'
        env:
          GITHUB_TOKEN:          ${{ secrets.DATA_REPO_TOKEN }}
          REPO_OWNER:            Koriebonx98
          REPO_NAME:             Game.OS.Private.Data
          ADMIN_GAMEOS_PASSWORD: ${{ secrets.ADMIN_GAMEOS_PASSWORD || 'GameOS2026' }}
          PORT:                  3000
        run: |
          set -e

          # Install display + screenshot tools
          sudo apt-get install -y --no-install-recommends \
            xvfb scrot libx11-6 libxext6 libxfixes3 libxi6 libxcursor1 \
            libxrender1 libxinerama1 libatk1.0-0 libgtk-3-0 \
            libxcomposite1 libxdamage1 2>&1 | tail -3

          # Build the Linux launcher binary
          dotnet publish GameLauncher/GameLauncher.csproj \
            -c Release -r linux-x64 --self-contained true \
            -p:PublishSingleFile=true \
            -o /tmp/gameos-linux 2>&1 | tail -3

          # Write backend URL so the launcher auto-connects
          echo "http://localhost:3000" > /tmp/gameos-linux/gameos-backend.url

          # Pre-seed a saved Admin.GameOS session so the app auto-logs in
          mkdir -p ~/.config/GameOS
          cat > ~/.config/GameOS/sessions.json << 'SESSIONS'
          [
            {
              "username": "Admin.GameOS",
              "email": "admin@gameos.com",
              "token": "WILL_BE_REPLACED_BY_BACKEND",
              "avatarColor": "#1f6feb",
              "savedAt": "2026-01-01T00:00:00.000Z",
              "rememberMe": true
            }
          ]
          SESSIONS

          # Obtain a real Admin.GameOS token from the backend and update the session
          export TOKEN_HMAC_SECRET="$(openssl rand -hex 32)"
          cd backend
          nohup node index.js > /tmp/backend-screenshot.log 2>&1 &
          BACKEND_PID=$!
          echo "$BACKEND_PID" > /tmp/backend-screenshot.pid

          # Wait for backend
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000/health > /dev/null 2>&1; then
              echo "✅ Backend ready for screenshots"
              break
            fi
            sleep 1
          done
          cd ..

          # Obtain real session token for Admin.GameOS
          ADMIN_TOKEN=$(curl -sf -X POST http://localhost:3000/api/auth/token \
            -H "Content-Type: application/json" \
            -d "{\"username\":\"Admin.GameOS\",\"password\":\"$ADMIN_GAMEOS_PASSWORD\"}" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('token',''))" 2>/dev/null || echo "")

          if [ -n "$ADMIN_TOKEN" ]; then
            python3 -c "
          import json
          s = [{
            'username': 'Admin.GameOS',
            'email': 'admin@gameos.com',
            'token': '$ADMIN_TOKEN',
            'avatarColor': '#1f6feb',
            'savedAt': '2026-01-01T00:00:00.000Z',
            'rememberMe': True
          }]
          import os; os.makedirs(os.path.expanduser('~/.config/GameOS'), exist_ok=True)
          with open(os.path.expanduser('~/.config/GameOS/sessions.json'), 'w') as f:
            json.dump(s, f, indent=2)
          print('✅ Session file written with real Admin.GameOS token')
          "
          else
            echo "⚠  Could not obtain Admin.GameOS token — app will show login screen"
          fi

          mkdir -p /tmp/launcher-screenshots

          # Start Xvfb virtual display
          Xvfb :98 -screen 0 1400x900x24 -ac &
          XVFB_PID=$!
          sleep 2
          echo "Xvfb started on :98 (PID $XVFB_PID)"

          # Launch the C# app
          export DISPLAY=:98
          export GAMEOS_BACKEND_URL=http://localhost:3000
          /tmp/gameos-linux/GameLauncher &
          LAUNCHER_PID=$!
          echo "Launcher PID: $LAUNCHER_PID"
          sleep 10

          # Take screenshots
          DISPLAY=:98 scrot /tmp/launcher-screenshots/01_launcher_startup.png 2>/dev/null || true
          echo "Screenshot 01: $(stat -c%s /tmp/launcher-screenshots/01_launcher_startup.png 2>/dev/null || echo 0) bytes"

          sleep 5
          DISPLAY=:98 scrot /tmp/launcher-screenshots/02_launcher_loaded.png 2>/dev/null || true
          echo "Screenshot 02: $(stat -c%s /tmp/launcher-screenshots/02_launcher_loaded.png 2>/dev/null || echo 0) bytes"

          # Save backend log as proof of requests processed during screenshot
          if [ -f /tmp/backend-screenshot.log ]; then
            cp /tmp/backend-screenshot.log /tmp/launcher-screenshots/backend-requests.log
            echo ""
            echo "=== Backend requests during screenshot session ==="
            cat /tmp/backend-screenshot.log | head -30
          fi

          # Stop launcher and Xvfb
          if kill "$LAUNCHER_PID" 2>/dev/null; then echo "Launcher stopped"; fi
          if kill "$XVFB_PID" 2>/dev/null; then echo "Xvfb stopped"; fi

          # Stop screenshot backend
          if [ -f /tmp/backend-screenshot.pid ]; then
            BACKEND_PID=$(cat /tmp/backend-screenshot.pid)
            kill "$BACKEND_PID" 2>/dev/null && echo "Screenshot backend stopped" || true
          fi

          echo "✅ Screenshots saved to /tmp/launcher-screenshots/"
          ls -lh /tmp/launcher-screenshots/

      - name: Upload GUI screenshots artifact
        if: env.BACKEND_STARTED == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: csharp-launcher-screenshots
          path: /tmp/launcher-screenshots/
          retention-days: 90
          if-no-files-found: warn

      # ── Publish Windows x64 app folder ────────────────────────────────────
      # Keep sidecar native media files in output so intro/trailer playback
      # works reliably on Windows release builds.
      - name: Publish Windows x64 standalone exe
        run: |
          dotnet publish GameLauncher/GameLauncher.csproj \
            -c Release \
            -r win-x64 \
            --self-contained true \
            -p:PublishSingleFile=false \
            -o /tmp/GameOS-Launcher-win-x64
          echo "✅ Windows exe published to /tmp/GameOS-Launcher-win-x64"
          echo "   Included files:"
          ls -lh /tmp/GameOS-Launcher-win-x64/
          echo ""
          if grep -q . /tmp/GameOS-Launcher-win-x64/gameos-backend.url 2>/dev/null; then
            echo "✅ gameos-backend.url — backend URL baked in (login works out of the box)"
          else
            echo "ℹ  gameos-backend.url — empty (launcher will use GitHub-direct mode)"
          fi

      # ── Publish Linux x64 ────────────────────────────────────────────────
      - name: Publish Linux x64 standalone binary
        run: |
          dotnet publish GameLauncher/GameLauncher.csproj \
            -c Release \
            -r linux-x64 \
            --self-contained true \
            -p:PublishSingleFile=true \
            -o /tmp/GameOS-Launcher-linux-x64
          echo "✅ Linux binary published to /tmp/GameOS-Launcher-linux-x64"
          ls -lh /tmp/GameOS-Launcher-linux-x64/

      # ── Add Linux-specific extras (desktop entry, installer, checker) ─────
      # These files let Bazzite / Linux users install the launcher into their
      # application menu and run the same GitHub-mode diagnostics as the
      # Windows check-github-mode.vbs — no Wine or VBScript required.
      - name: Add Linux extras to Linux artifact
        run: |
          cp GameLauncher/GameOS-Launcher.desktop /tmp/GameOS-Launcher-linux-x64/
          cp GameLauncher/install-linux.sh        /tmp/GameOS-Launcher-linux-x64/
          cp check-github-mode.sh                 /tmp/GameOS-Launcher-linux-x64/
          chmod +x /tmp/GameOS-Launcher-linux-x64/install-linux.sh
          chmod +x /tmp/GameOS-Launcher-linux-x64/check-github-mode.sh
          echo "✅ Linux extras added:"
          echo "   • GameOS-Launcher.desktop  (application menu entry)"
          echo "   • install-linux.sh         (run once to register in app menu)"
          echo "   • check-github-mode.sh     (bash equivalent of check-github-mode.vbs)"

      # ── Publish macOS x64 ────────────────────────────────────────────────
      - name: Publish macOS x64 standalone binary
        run: |
          dotnet publish GameLauncher/GameLauncher.csproj \
            -c Release \
            -r osx-x64 \
            --self-contained true \
            -p:PublishSingleFile=true \
            -o /tmp/GameOS-Launcher-osx-x64
          echo "✅ macOS x64 binary published to /tmp/GameOS-Launcher-osx-x64"
          ls -lh /tmp/GameOS-Launcher-osx-x64/

      # ── Publish macOS arm64 (Apple Silicon) ───────────────────────────────
      - name: Publish macOS arm64 standalone binary (Apple Silicon)
        run: |
          dotnet publish GameLauncher/GameLauncher.csproj \
            -c Release \
            -r osx-arm64 \
            --self-contained true \
            -p:PublishSingleFile=true \
            -o /tmp/GameOS-Launcher-osx-arm64
          echo "✅ macOS arm64 binary published to /tmp/GameOS-Launcher-osx-arm64"
          ls -lh /tmp/GameOS-Launcher-osx-arm64/

      # ── Capture results as artifact ───────────────────────────────────────
      - name: Save test results as artifact
        if: always()
        run: |
          mkdir -p /tmp/launcher-test-results

          if [ -f /tmp/login-test-output.txt ]; then
            cp /tmp/login-test-output.txt /tmp/launcher-test-results/
          fi

          cat > /tmp/launcher-test-results/summary.txt << 'EOF'
          ═══════════════════════════════════════════════════════════════════
            Game.OS C# Launcher — Login Authentication Summary
          ═══════════════════════════════════════════════════════════════════

            Auth method A (GitHub-direct, Test 5):
              PBKDF2-SHA256, 100,000 iterations — same as script.js hashPassword()
              Requires DATA_REPO_TOKEN (GitHub PAT) in gameos-token.dat

            Auth method B (Backend REST API, Tests 6 & 7 — PREFERRED):
              POST {GAMEOS_BACKEND_URL}/api/auth/token  { username, password }
              No GitHub PAT required from the client.
              Backend URL baked into gameos-backend.url at build time.
              Same endpoint the web frontend calls in backend mode.

            Test 7 (new): Backend API login using Admin.GameOS account
              The backend auto-creates Admin.GameOS on first startup.
              C# launcher calls POST /api/auth/token  →  Bearer token
              Proves the C# app logs in via the backend API exactly as required.

            Dual-hash    : PBKDF2 (web/launcher accounts) + bcrypt
                          (Node.js backend accounts) both supported

            Local backend: http://localhost:3000 (started in CI from backend/index.js)
            Test account : Koriebonx98 (Tests 5-6), Admin.GameOS (Test 7)
            Data repo    : Koriebonx98/Game.OS.Private.Data (same as web)
          ═══════════════════════════════════════════════════════════════════
          EOF

      - name: Upload test results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: csharp-launcher-login-test-results
          path: /tmp/launcher-test-results/
          retention-days: 30

      - name: Upload Windows exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: GameOS-Launcher-win-x64
          path: /tmp/GameOS-Launcher-win-x64/
          retention-days: 90

      - name: Upload Linux binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: GameOS-Launcher-linux-x64
          path: /tmp/GameOS-Launcher-linux-x64/
          retention-days: 90

      - name: Upload macOS x64 binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: GameOS-Launcher-osx-x64
          path: /tmp/GameOS-Launcher-osx-x64/
          retention-days: 90

      - name: Upload macOS arm64 binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: GameOS-Launcher-osx-arm64
          path: /tmp/GameOS-Launcher-osx-arm64/
          retention-days: 90
