# CI – runs on every pull request targeting main
#
# Validates:
#   1. The deploy.yml GITHUB_TOKEN_ENCODED-injection step would succeed on this branch's script.js
#   2. The deploy.yml GAMES_DB_TOKEN_ENCODED-injection step would succeed on this branch's script.js
#   3. The frontend HTML files are present and syntactically well-formed
#   4. The backend Node.js code is syntactically valid
#   5. The C# GameLauncher, GameScanner.Tests and LoginAuth.Tests projects compile without errors
#   6. The C# login-auth unit tests (hash parity + bcrypt) all pass
#   7. The C# game-scanner tests (Steam/Epic/GOG/Xbox/ROM detection) all pass

name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify GITHUB_TOKEN_ENCODED injection regex matches script.js
        run: |
          python3 << 'PYEOF'
          import re, sys

          with open('script.js', 'r', encoding='utf-8') as f:
              content = f.read()

          if not re.search(r"const GITHUB_TOKEN_ENCODED\s*=\s*'[^']*';", content):
              print('ERROR: GITHUB_TOKEN_ENCODED placeholder missing or malformed in script.js')
              sys.exit(1)

          print('✅ script.js GITHUB_TOKEN_ENCODED placeholder OK')
          PYEOF

      - name: Verify GAMES_DB_TOKEN_ENCODED injection regex matches script.js
        run: |
          python3 << 'PYEOF'
          import re, sys

          with open('script.js', 'r', encoding='utf-8') as f:
              content = f.read()

          if not re.search(r"const GAMES_DB_TOKEN_ENCODED\s*=\s*'[^']*';", content):
              print('ERROR: GAMES_DB_TOKEN_ENCODED placeholder missing or malformed in script.js')
              sys.exit(1)

          print('✅ script.js GAMES_DB_TOKEN_ENCODED placeholder OK')
          PYEOF

      - name: Check frontend files exist
        run: |
          for f in index.html login.html signup.html account.html games.html friends.html inbox.html profile.html script.js styles.css; do
            if [ ! -f "$f" ]; then
              echo "ERROR: missing frontend file: $f"
              exit 1
            fi
          done
          echo "✅ All frontend files present"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check backend JS syntax
        run: node --check backend/index.js && echo "✅ backend/index.js syntax OK"

      - name: Check script.js syntax
        run: node --check script.js && echo "✅ script.js syntax OK"

  validate-csharp:
    name: Build & test C# launcher
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore NuGet packages
        run: dotnet restore Game.OS.Userdata.sln

      - name: Build GameLauncher
        run: dotnet build GameLauncher/GameLauncher.csproj -c Release --no-restore

      - name: Build GameScanner.Tests
        run: dotnet build GameScanner.Tests/GameScanner.Tests.csproj -c Release --no-restore

      - name: Build LoginAuth.Tests
        run: dotnet build LoginAuth.Tests/LoginAuth.Tests.csproj -c Release --no-restore

      - name: Run GameScanner.Tests — Steam/Epic/GOG/Xbox/ROM detection
        # Tests verify game detection for all supported storefronts:
        #   Steam   — folder scan + libraryfolders.vdf parsing
        #   Epic    — .item manifest file parsing (DisplayName, InstallLocation)
        #   GOG     — folder scan under Program Files (x86)\GOG Galaxy\Games\
        #   Xbox    — folder scan under XboxGames\
        #   EA      — folder scan under Origin Games\ and EA Games\
        #   Ubisoft — folder scan under Ubisoft Game Launcher\games\
        #   ROMs    — PS1/PS2/PS3/PS4/Switch/GBA/SNES/Xbox 360 with TitleID detection
        run: |
          dotnet run --project GameScanner.Tests -c Release --no-build
          echo "✅ C# game-scanner tests passed — all storefronts detected correctly"

      - name: Run LoginAuth.Tests — hash parity + bcrypt checks (no network)
        # Tests 1–4 verify that the C# PBKDF2 hash matches the JavaScript
        # hashPassword() function byte-for-byte, and that the bcrypt path works.
        # Test 5 (live backend) is skipped automatically when GAMEOS_GITHUB_TOKEN
        # is not set — it runs in the separate build-csharp-launcher.yml workflow.
        run: |
          dotnet run --project LoginAuth.Tests -c Release --no-build
          echo "✅ C# login auth tests passed — hash parity with web frontend confirmed"
